<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Vibrant Cheerful Sunset Gradient -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2D55" /> <!-- Cheerful Pink -->
      <stop offset="50%" stop-color="#FF5E3A" /> <!-- Vibrant Orange -->
      <stop offset="100%" stop-color="#FFB300" /> <!-- Sunset Gold -->
    </linearGradient>

    <!-- Sleek Neon Violet Glow -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2D55" />
      <stop offset="100%" stop-color="#AF52DE" /> <!-- Cheerful Purple -->
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#FF2D55" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Clean, Cheerful, Bright Background -->
  <rect width="512" height="512" rx="140" fill="#FFFFFF" />

  <!-- Stylized Play Button / R Ribbon -->
  <g filter="url(#glow)">
    <!-- Main outer play/R curve -->
    <path d="M 160 120 L 160 392 C 160 405 175 412 185 404 L 380 268 C 390 260 390 252 380 244 L 240 140 C 230 132 215 138 215 152 L 215 270" 
          fill="none" 
          stroke="url(#primaryGrad)" 
          stroke-width="44" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- Innermost playful core (vibrant play indicator) -->
    <path d="M 235 210 L 295 256 L 235 302 Z" fill="url(#accentGrad)" />
  </g>
</svg>
