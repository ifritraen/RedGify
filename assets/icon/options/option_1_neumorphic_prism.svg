<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Neumorphic shadows for the base card -->
    <filter id="neuShadow" x="-20%" y="-20%" width="145%" height="145%">
      <feDropShadow dx="-10" dy="-10" stdDeviation="15" flood-color="#FFFFFF" flood-opacity="1.0" />
      <feDropShadow dx="12" dy="12" stdDeviation="18" flood-color="#D1D9E6" flood-opacity="0.6" />
    </filter>
    
    <!-- Glow filter for prism circles -->
    <filter id="prismGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#FF3366" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- Clean, Cheerful, Bright Background Canvas -->
  <rect width="512" height="512" rx="140" fill="#FFFFFF" />

  <!-- Neumorphic Base Card (Light Gray-Blue base for neumorphic contrast) -->
  <rect x="76" y="76" width="360" height="360" rx="90" fill="#F0F4F8" filter="url(#neuShadow)" />

  <!-- The Prism Elements: 3 overlapping colorful blobs with screen/multiply blend representation -->
  <g filter="url(#prismGlow)">
    <!-- Blob 1: Cheerful Pink -->
    <circle cx="216" cy="226" r="100" fill="#FF5E8A" opacity="0.8" />

    <!-- Blob 2: Light Yellow -->
    <circle cx="300" cy="226" r="100" fill="#FFE169" opacity="0.8" />

    <!-- Blob 3: Light Blue -->
    <circle cx="256" cy="300" r="100" fill="#6BD6FF" opacity="0.8" />
  </g>

  <!-- Sharp, bold cutout of R + Play button in the center overlay -->
  <g transform="translate(196, 176)">
    <!-- Main stem + kickstand -->
    <path d="M 0,0 L 40,0 L 40,160 L 0,160 Z M 35,80 L 100,160 L 50,160 L 0,100 Z" fill="#FFFFFF" />
    <!-- Play-shaped loop of R -->
    <path d="M 40,0 L 110,40 C 118,45 118,55 110,60 L 40,100 Z" fill="#FFFFFF" />
    <!-- Cutout inside the loop -->
    <path d="M 40,25 L 75,50 L 40,75 Z" fill="#F0F4F8" />
  </g>
</svg>
