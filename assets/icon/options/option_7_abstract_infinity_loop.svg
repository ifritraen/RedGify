<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="prismGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5E8A" /> <!-- Pink -->
      <stop offset="50%" stop-color="#FFE169" /> <!-- Yellow -->
      <stop offset="100%" stop-color="#6BD6FF" /> <!-- Blue -->
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#FF5E8A" flood-opacity="0.15" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="140" fill="#FFFFFF" />
  <rect x="76" y="76" width="360" height="360" rx="90" fill="#FAFAFC" />

  <g filter="url(#shadow)" transform="translate(100, 156)">
    <!-- Infinity loop track forming a play button flow -->
    <path d="M 50,100 C -20,20 -20,180 50,100 C 120,20 220,50 250,100 C 220,150 120,180 50,100 Z" 
          fill="none" stroke="url(#prismGrad)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" />
          
    <!-- Frosted glass play core triangle floating in the loop -->
    <path d="M 230,75 L 280,100 L 230,125 Z" 
          fill="#FFFFFF" fill-opacity="0.4" stroke="#FFFFFF" stroke-opacity="0.9" stroke-width="4.5" stroke-linejoin="round" />
  </g>
</svg>
