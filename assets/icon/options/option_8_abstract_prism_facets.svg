<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="140" fill="#FFFFFF" />
  <rect x="76" y="76" width="360" height="360" rx="90" fill="#F9FAFB" />

  <!-- Triangles overlapping with opacity to create colorful intersections -->
  <g transform="translate(60, 40)">
    <!-- 1. Yellow Triangle (back, offset down) -->
    <path d="M 180,130 L 320,220 L 180,310 Z" fill="#FFE169" opacity="0.85" />

    <!-- 2. Blue Triangle (back, offset up-left) -->
    <path d="M 140,90 L 280,180 L 140,270 Z" fill="#6BD6FF" opacity="0.75" />

    <!-- 3. Pink Triangle (front, centered) -->
    <path d="M 160,110 L 300,200 L 160,290 Z" fill="#FF5E8A" opacity="0.8" />

    <!-- 4. Frosted Glass Overlay Prism Triangle (skewed/rotated, highlights intersection) -->
    <path d="M 210,130 L 330,200 L 210,270 Z" 
          fill="#FFFFFF" fill-opacity="0.25" stroke="#FFFFFF" stroke-opacity="0.8" stroke-width="5" stroke-linejoin="round" />
  </g>
</svg>
