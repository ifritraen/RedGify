<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.05" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="140" fill="#FFFFFF" />
  <!-- Light yellow pastel base -->
  <rect x="76" y="76" width="360" height="360" rx="90" fill="#FFFDF0" stroke="#FFF7D6" stroke-width="1.5" />

  <g filter="url(#soft)" transform="translate(130, 136)">
    <!-- Parallel capsule lines of pink, blue, yellow forming a play shape -->
    <!-- Column 1 (Leftmost, Tall) -->
    <rect x="0" y="0" width="32" height="240" rx="16" fill="#FF5E8A" />
    
    <!-- Column 2 -->
    <rect x="48" y="24" width="32" height="192" rx="16" fill="#6BD6FF" />
    
    <!-- Column 3 -->
    <rect x="96" y="48" width="32" height="144" rx="16" fill="#FFE169" />
    
    <!-- Column 4 -->
    <rect x="144" y="72" width="32" height="96" rx="16" fill="#FF5E8A" />
    
    <!-- Column 5 (Rightmost, Short Tip) -->
    <rect x="192" y="96" width="32" height="48" rx="16" fill="#6BD6FF" />

    <!-- Glass overlay capsule spanning diagonally across the tips -->
    <path d="M -16,40 L 240,120 L -16,200 Z" fill="#FFFFFF" fill-opacity="0.2" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="4" stroke-linejoin="round" />
  </g>
</svg>
